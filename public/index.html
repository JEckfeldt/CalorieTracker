<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calorie Tracker</title>

    <link rel="stylesheet" href="styles.css">
</head>


<!-- Main Body -->
<body class="bg-mist-600 text-slate-800">
    <!-- User Bar -->
    <div class="bg-white border-b border-slate-200">
      <div class="max-w-5xl mx-auto px-6 py-3 flex items-   center justify-between">
        <div class="text-lg font-semibold text-slate-800">
          Calorie Tracker
        </div>

        <div class="flex items-center gap-3">
          <div class="flex items-center gap-2">
            <div class="w-8 h-8 rounded-full bg-green-500 flex items-center justify-center text-white font-bold">
              J
            </div>
            <div class="text-sm">
              <p class="font-semibold text-slate-800">John Doe</p>
              <p class="text-slate-500 text-xs">Logged in</p>
            </div>
          </div>

          <button class="text-sm bg-slate-100 hover:bg-slate-200 px-3 py-1.5 rounded-lg text-slate-700">
            Log out
          </button>
        </div>
      </div>
    </div>


  <div class="max-w-5xl mx-auto p-6">

    <!-- Main layout -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">

      <!-- LEFT: Search + Results -->
      <section class="md:col-span-2 space-y-4">

        <!-- Search -->
        <div class="bg-white p-4 rounded-xl shadow">
          <input
            class="w-full border border-slate-200 rounded-lg p-2 focus:outline-none focus:ring-2 focus:ring-green-400"
            placeholder="Search for food..."
          />
        </div>

        <!-- Results -->
        <div class="bg-white p-4 rounded-xl shadow">
          <h2 class="font-semibold mb-2">Search Results</h2>

          <div class="text-slate-400">
            No results yet
          </div>

          <!-- Example card (for design only) -->
          <div class="mt-3 border rounded-lg p-3 flex justify-between items-center">
            <div>
              <p class="font-medium">Banana</p>
              <p class="text-sm text-slate-500">105 calories • 1 medium</p>
            </div>
            <button class="bg-green-500 text-white px-3 py-1 rounded-lg">
              Add
            </button>
          </div>

        </div>

      </section>

      <!-- RIGHT: Summary -->
      <aside class="space-y-4">

        <div class="bg-white p-4 rounded-xl shadow">
          <h2 class="font-semibold mb-3">Today's Summary</h2>

          <div class="space-y-2 text-sm">
            <p>Calories: <span class="font-semibold">0 / 2000</span></p>
            <p>Protein: <span class="font-semibold">0g</span></p>
            <p>Carbs: <span class="font-semibold">0g</span></p>
            <p>Fat: <span class="font-semibold">0g</span></p>
          </div>
        </div>

        <div class="bg-white p-4 rounded-xl shadow">
          <h2 class="font-semibold mb-3">Today's Food</h2>

          <p class="text-slate-400 text-sm">
            No foods added yet
          </p>
        </div>

      </aside>

    </div>

  </div>

<!-- JS Sources -->
<script src="app.js"></script>
</body>
</html>
